<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>

    <link rel="stylesheet" href="./styles.css">
    <!-- Font style from google fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- Navbar -->
    <section class="nav_bar">
        <img src="./Assets/Kokomi.png.webp" height="70" alt="website logo">

        <nav class="gradiant">
            <a class="nav_items" href="./index.html">Home</a>
            <a class="nav_items" href="./about.html">About</a>
            <a class="nav_items" href="./gallery.html">Gallery</a>
            <a class="nav_items" href="./quiz.html">Quiz</a>
            <a class="nav_items" href="./contact.html">Contact</a>
        </nav>

    </section>

    <section class="container">
        <h1 style="text-align: center; padding-bottom: 15px;">Math Quiz</h1>

        <div id="quiz" class="form-grid">

            <p id="progress">Press “Start Quiz” to begin</p>
            <h2 id="question" class="card-title" style="display:none;"></h2>

            <label for="answer">Your Answer:</label>
            <input type="number" id="answer" placeholder="Enter your answer" />

            <div class="form-button quiz-actions">
                <button id="start" onclick="startQuiz()">Start Quiz</button>
                <button id="submit" onclick="submitAnswer()">Submit</button>
                <button id="next" onclick="nextQuestion()">Next</button>
            </div>
        </div>
    </section>

    <script defer src="./script.js"></script>

</body>

</html>
