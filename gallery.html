    <!--The gallery-->
    <section class="gallery-section">

        <h1>Welcome To My Gallery</h1>
        <h2>Nature</h2>
        <div class="container-grid">

            <!--SKy-->
            <div class="grid-item">
                <figure class="gallery-card">
                    <div class="img-wrap">
                        <img src="./Assets/gallery/Sky.JPG" alt="Image of the sun with the clouds">
                    </div>
                    <figcaption class="card-body">
                        <h3 class="card-title">Sun and Clouds</h3>
                        <p class="card-text">The scenery of the sun shining through the clouds is such peaceful thing to
                            look at, it fills me with warmth.
                        </p>
                    </figcaption>
                </figure>
            </div>

            <!--Flower-->
            <div class="grid-item">
                <figure class="gallery-card">
                    <div class="img-wrap">
                        <img src="./Assets/gallery/Flowers.JPG" alt="Image of a flower">
                    </div>
                    <figcaption class="card-body">
                        <h3 class="card-title">Flowers</h3>
                        <p class="card-text"> I went on a university trip with my friend to a plantation field near the
                            airport. It was a memorable experience.
                        </p>
                    </figcaption>
                </figure>
            </div>

            <!--Sea-->
            <div class="grid-item">
                <figure class="gallery-card">
                    <div class="img-wrap">
                        <img src="./Assets/gallery/Sea.JPG" alt="sunset sea">
                    </div>
                    <figcaption class="card-body">
                        <h3 class="card-title">Sea</h3>
                        <p class="card-text">I love taking pictures of the sea during sunset or sunrise i find it to be
                            such a calming time filled with peace.
                        </p>
                    </figcaption>
                </figure>
            </div>
        </div>

        <h2>Things I am proud of</h2>
        <div class="container-grid">

            <!--SM award-->
            <div class="grid-item">
                <figure class="gallery-card">
                    <div class="img-wrap">
                        <img src="./Assets/gallery/Smart_methods_award.JPG" alt="Award">
                    </div>
                    <figcaption class="card-body">
                        <h3 class="card-title">Summer training</h3>
                        <p class="card-text">I received this for finishing my summer training at Smart Methods in the
                            Web Development and NLP path.
                        </p>
                    </figcaption>
                </figure>
            </div>

            <!--My frist website-->
            <div class="grid-item">
                <figure class="gallery-card">
                    <div class="img-wrap">
                        <a href="https://rimas-ri.github.io/Capstone-project-2--personal-site/">
                            <img src="./Assets/gallery/First_website.png" alt="Image of my first website">
                        </a>
                    </div>
                    <figcaption class="card-body">
                        <h3 class="card-title">My first personal website</h3>
                        <p class="card-text">My first "good-looking" website. I learned
                            many things while doing it <span>click on the picture </span>to see the website!
                        </p>
                    </figcaption>
                </figure>
            </div>

            <!--My project-->
            <div class="grid-item">
                <figure class="gallery-card">
                    <div class="img-wrap">
                        <img src="./Assets/gallery/Recipe finder copy.png" alt="Image of Recipe finder">
                    </div>
                    <figcaption class="card-body">
                        <h3 class="card-title">Recipe Finder</h3>
                        <p class="card-text">A project I created called Recipe Finder, which helps users quickly
                            discover new recipes.</p>
                    </figcaption>
                </figure>
            </div>
        </div>

        <h2>My favorite games!</h2>
        <div class="container-grid">

            <!--Nier: Automata-->
            <div class="grid-item">
                <figure class="gallery-card">
                    <div class="img-wrap">
                        <img src="./Assets/gallery/Nier_automata.jpg" alt="Nier automata">
                    </div>
                    <figcaption class="card-body">
                        <h3 class="card-title">NieR: Automata</h3>
                        <p class="card-text">The second game I played in the NieR series, a great sequel.
                            It's about androids and how they find a purpose in a world without humans.
                        </p>
                    </figcaption>
                </figure>
            </div>

            <!--Nier: Repliacnt-->
            <div class="grid-item">
                <figure class="gallery-card">
                    <div class="img-wrap">
                        <img src="./Assets/gallery/Nier_replicant.jpg" alt="Nier replicant">
                    </div>
                    <figcaption class="card-body">
                        <h3 class="card-title">NieR: Repliacnt</h3>
                        <p class="card-text"> This game has a special place in my heart.
                            I had such an amazing experience playing it, a game that truly touches the soul.
                        </p>
                    </figcaption>
                </figure>
            </div>

            <!--drakengard3-->
            <div class="grid-item">
                <figure class="gallery-card">
                    <div class="img-wrap">
                        <img src="./Assets/gallery/DOD3.jpeg" alt="drakengard3">
                    </div>
                    <figcaption class="card-body">
                        <h3 class="card-title">drakengard3</h3>
                        <p class="card-text">The original game that started the NieR series!
                            It's set in a parallel world similar to ours, but one struck by disaster.
                        </p>
                    </figcaption>
                </figure>
            </div>
        </div>
